<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Feedback - AI Power3D</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>.glass{max-width:900px;margin:40px auto;background:rgba(255,255,255,0.95);padding:20px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,0.08)}</style></head><body>
<div class="glass">
 <div class="d-flex justify-content-between"><h4>AI-Powered Student Feedback</h4><div><a href="/dashboard.html" class="btn btn-outline-secondary">Dashboard</a> <a href="/login.html" class="btn btn-outline-secondary">Logout</a></div></div>
 <form id="feedbackForm"><div class="row"><div class="col-md-6 mb-2"><label>Student Name</label><input id="studentName" class="form-control"></div>
 <div class="col-md-6 mb-2"><label>Category</label><select id="category" class="form-select"><option>Class</option><option>Infrastructure</option><option>Lectures</option><option>Library</option><option>Exams</option><option>Others</option></select></div>
 <div class="col-12 mb-2"><label>Feedback</label><textarea id="feedbackText" class="form-control" rows="6"></textarea></div></div>
 <button class="btn btn-primary" type="submit">Analyze & Submit</button> <button type="button" id="clearBtn" class="btn btn-outline-secondary">Clear</button>
 </form>
 <div id="result" style="display:none;margin-top:12px"><strong>Sentiment:</strong> <span id="outLabel"></span> | <strong>Score:</strong> <span id="outScore"></span></div>
</div>
<script>
function query(n){return new URLSearchParams(window.location.search).get(n)}
document.getElementById('studentName').value = query('cid') || '';
document.getElementById('feedbackForm').addEventListener('submit', async function(e){
 e.preventDefault();
 const studentName = document.getElementById('studentName').value || 'Anonymous';
 const text = document.getElementById('feedbackText').value;
 const category = document.getElementById('category').value;
 if(!text.trim()){alert('Enter feedback');return;}
 const resp = await fetch('/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({studentName,text,category})});
 const data = await resp.json();
 document.getElementById('outLabel').innerText = data.sentimentLabel; document.getElementById('outScore').innerText = Number(data.sentimentScore).toFixed(3);
 document.getElementById('result').style.display='block'; document.getElementById('feedbackText').value='';
});
document.getElementById('clearBtn').addEventListener('click', function(){document.getElementById('studentName').value='';document.getElementById('feedbackText').value='';document.getElementById('result').style.display='none'});
</script>
</body></html>
