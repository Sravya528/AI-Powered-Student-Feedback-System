<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - AI Power3D</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>body{background:#f4f6fb} .card{border-radius:10px}</style></head><body>
<nav class="navbar navbar-light bg-white shadow-sm"><div class="container"><a class="navbar-brand" href="/">AI Power3D</a><div><a class="btn btn-outline-primary me-2" href="/student.html">Student Form</a><a class="btn btn-outline-secondary" href="/login.html">Logout</a></div></div></nav>
<div class="container-fluid py-4"><div class="row"><div class="col-lg-8"><div class="row g-3">
 <div class="col-md-6"><div class="card p-3"><h6>Overall Sentiment</h6><canvas id="sentPie" height="220"></canvas></div></div>
 <div class="col-md-6"><div class="card p-3"><h6>Feedbacks by Category</h6><canvas id="catDough" height="220"></canvas></div></div>
 <div class="col-12"><div class="card p-3"><h6>Category Sentiment Breakdown</h6><div id="catBreak"></div></div></div>
 <div class="col-12"><div class="card p-3"><h6>Recent Feedbacks</h6><div class="table-responsive" style="max-height:320px;overflow:auto;margin-top:10px"><table class="table"><thead><tr><th>#</th><th>Name</th><th>Category</th><th>Feedback</th><th>Sentiment</th><th>Time</th></tr></thead><tbody id="recentBody"></tbody></table></div></div></div>
</div></div>
<div class="col-lg-4"><div class="card p-3"><h6>AI Recommendations</h6><div id="recoList"></div></div><div class="card p-3 mt-3"><h6>Quick Metrics</h6><div>Total: <span id="totalCnt">0</span> | Pos: <span id="posCnt">0</span> | Neu: <span id="neuCnt">0</span> | Neg: <span id="negCnt">0</span></div></div><div class="card p-3 mt-3"><button id="openH2" class="btn btn-outline-secondary">Open H2 Console</button> <button id="exportCSV" class="btn btn-outline-primary">Export CSV</button></div></div>
</div></div>
<script>
let pieChart, catChart;
async function fetchAll(){
 const [statsRes, feedsRes, recRes] = await Promise.all([fetch('/stats'), fetch('/feedbacks'), fetch('/recommendations')]);
 const stats = await statsRes.json(); const feeds = await feedsRes.json(); const recs = await recRes.json();
 const sentData = [stats.positive, stats.neutral, stats.negative];
 if(!pieChart) pieChart = new Chart(document.getElementById('sentPie'), {type:'pie', data:{labels:['Positive','Neutral','Negative'], datasets:[{data:sentData}]}}); else {pieChart.data.datasets[0].data = sentData; pieChart.update();}
 const cats = stats.categoryCounts || {}; const labels = Object.keys(cats); const values = labels.map(l=>cats[l]);
 if(!catChart) catChart = new Chart(document.getElementById('catDough'), {type:'doughnut', data:{labels:labels, datasets:[{data:values}]}}); else {catChart.data.labels = labels; catChart.data.datasets[0].data = values; catChart.update();}
 const cb = document.getElementById('catBreak'); cb.innerHTML=''; Object.keys(stats.categorySentiment || {}).forEach(cat=>{ const d = stats.categorySentiment[cat]; const div = document.createElement('div'); div.innerText = cat + ' - Positive:' + (d.Positive||0) + ' Neutral:' + (d.Neutral||0) + ' Negative:' + (d.Negative||0); cb.appendChild(div); });
 const tbody = document.getElementById('recentBody'); tbody.innerHTML=''; feeds.slice().reverse().forEach((r,idx)=>{ const tr = document.createElement('tr'); tr.innerHTML = `<td>${feeds.length-idx}</td><td>${r.studentName||'-'}</td><td>${r.category||'-'}</td><td>${r.text||'-'}</td><td>${r.sentimentLabel||'-'}</td><td>${r.createdAt?new Date(r.createdAt).toLocaleString():'-'}</td>`; tbody.appendChild(tr);});
 const recoDiv = document.getElementById('recoList'); recoDiv.innerHTML=''; recs.forEach(r=>{ const e = document.createElement('div'); e.style.padding='8px'; e.style.marginBottom='8px'; e.style.background='#fff'; e.innerText = r; recoDiv.appendChild(e);});
 document.getElementById('totalCnt').innerText = stats.total || 0; document.getElementById('posCnt').innerText = stats.positive || 0; document.getElementById('neuCnt').innerText = stats.neutral || 0; document.getElementById('negCnt').innerText = stats.negative || 0;
}
document.getElementById('openH2').addEventListener('click', function(){ window.open('/h2-console','_blank'); });
document.getElementById('exportCSV').addEventListener('click', function(){ fetch('/feedbacks').then(r=>r.json()).then(data=>{ let csv='id,studentName,category,text,sentimentLabel,sentimentScore,createdAt\n'; data.forEach(d=>{ csv += `${d.id},"${(d.studentName||'').replace(/"/g,'""')}","${(d.category||'').replace(/"/g,'""')}","${(d.text||'').replace(/"/g,'""')}",${d.sentimentLabel||''},${d.sentimentScore||0},${d.createdAt||''}\n`; }); const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='feedbacks.csv'; a.click(); }); });
window.addEventListener('load', function(){ fetchAll(); setInterval(fetchAll, 6000); });
</script>
</body></html>
